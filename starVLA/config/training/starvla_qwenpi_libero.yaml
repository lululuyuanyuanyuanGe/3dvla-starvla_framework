run_id: qwenpi_libero
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: your_wandb_entity  # ← CHANGE THIS to your wandb username
wandb_project: starvla_qwenpi
is_debug: false

framework:
  name: QwenPI  # ← This is the key change - using QwenPI framework
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen2.5-VL-3B-Instruct  # ← Update if using pretrained checkpoint
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048  # Qwen2.5-VL-3B hidden dimension
    num_vl_layers: 36    # Qwen2.5-VL-3B layers

  action_model:
    # Flow-Matching DiT configuration (layerwise cross-attention)
    action_model_type: DiT-B
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 7        # ← Adjust based on your robot (7 for WidowX: 6DOF + gripper)
    state_dim: 7         # ← Adjust based on your robot state
    future_action_window_size: 15  # Predict 16 steps (0-15)
    action_horizon: 16
    past_action_window_size: 0
    repeated_diffusion_steps: 4    # Number of diffusion repeats during training
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4     # DDIM sampling steps during inference
    num_target_vision_tokens: 32   # Cross-attention tokens

    diffusion_model_cfg:
      cross_attention_dim: 2048    # Must match vl_hidden_dim
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16               # Layerwise DiT depth
      output_dim: 2560             # DiT output dimension
      positional_embeddings: null

  reduce_in_full_precision: true

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: playground/Datasets/LEROBOT_LIBERO_DATA  # ← Update to your dataset path
    data_mix: libero_goal           # Options: libero_spatial, libero_object, libero_goal, libero_10
    action_type: delta_qpos         # LIBERO uses delta_qpos
    default_image_resolution: [3, 224, 224]
    image_size: [224, 224]
    per_device_batch_size: 16       # ← Adjust based on GPU memory (reduce if OOM)
    load_all_data_for_training: true
    obs: ["image_0"]                # Camera view(s) to use

trainer:
  epochs: 100
  max_train_steps: 30000            # QwenPI trained for 30k steps (~18 hours on 16×A100)
  num_warmup_steps: 1000
  save_interval: 5000               # Save checkpoint every 5000 steps
  eval_interval: 1000

  learning_rate:
    base: 1.0e-05                   # Base learning rate
    qwen_vl_interface: 1.0e-05      # VLM learning rate (can freeze by setting to 0)
    action_model: 1.0e-04           # Flow-matching head learning rate (higher for action head)

  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 5.0e-07

  freeze_modules: ''                # Leave empty to train all, or use regex to freeze VLM

  loss_scale:
    vla: 1.0                        # VLA loss weight
    vlm: 0.0                        # Set to 0.0 to disable VLM co-training

  max_grad_norm: 1.0
  warmup_ratio: 0.033               # warmup_steps / max_train_steps
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1   # ← Increase if batch size is too large for GPU

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  # Resume training or load pretrained checkpoint
  is_resume: false                  # Set to true to resume from last checkpoint
  # pretrained_checkpoint: ./playground/Pretrained_models/Qwen-FM-Bridge-RT-1/pytorch_model.pt  # Uncomment to load pretrained

  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
