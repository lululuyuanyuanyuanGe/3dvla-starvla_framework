run_id: qwenpi_bridge_rt1
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: your_wandb_entity  # ← CHANGE THIS
wandb_project: starvla_qwenpi
is_debug: false

framework:
  name: QwenPI
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen2.5-VL-3B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
    num_vl_layers: 36

  action_model:
    action_model_type: DiT-B
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 7        # WidowX robot: 6DOF + gripper
    state_dim: 7
    future_action_window_size: 15
    action_horizon: 16
    past_action_window_size: 0
    repeated_diffusion_steps: 4
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32

    diffusion_model_cfg:
      cross_attention_dim: 2048
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 2560
      positional_embeddings: null

  reduce_in_full_precision: true

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: playground/Datasets/OXE_LEROBOT_DATASET
    data_mix: bridge_rt_1           # Bridge + RT-1 dataset mixture
    action_type: delta_ee           # Real robot uses delta end-effector actions
    default_image_resolution: [3, 224, 224]
    image_size: [224, 224]
    per_device_batch_size: 16
    load_all_data_for_training: true
    obs: ["image_0"]

trainer:
  epochs: 100
  max_train_steps: 30000            # 30k steps as per official training
  num_warmup_steps: 1000
  save_interval: 5000
  eval_interval: 1000

  learning_rate:
    base: 1.0e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04

  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 5.0e-07

  freeze_modules: ''

  loss_scale:
    vla: 1.0
    vlm: 0.0

  max_grad_norm: 1.0
  warmup_ratio: 0.033
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  is_resume: false
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
